<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loot-Shelf Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Righteous&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#161922;--card:#1c2030;--border:#ffffff12;
  --border-hover:#ffffff28;--text:#f0f2f8;--muted:#7a8099;
  --green:#10b981;--amber:#f59e0b;--red:#ef4444;
  --grad:linear-gradient(135deg,#8b5cf6,#ec4899);
  color-scheme: dark;
}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;gap:12px}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo{font-family:'Righteous',cursive;font-size:22px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.admin-badge{background:#f59e0b20;border:1px solid #f59e0b44;color:#fbbf24;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.8px}
.header-right{display:flex;align-items:center;gap:10px}
.stat-chip{background:#ffffff08;border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
.stat-chip span{color:var(--text)}
.add-btn{background:var(--grad);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity 0.15s}
.add-btn:hover{opacity:0.85}
.storefront-link{background:#ffffff0a;border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:700;padding:7px 14px;border-radius:8px;text-decoration:none;transition:all 0.15s}
.storefront-link:hover{border-color:var(--border-hover);color:var(--text)}

.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:160px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted)}
.search-wrap input{width:100%;background:#ffffff08;border:1px solid var(--border);border-radius:9px;padding:8px 12px 8px 34px;font-size:13px;font-family:'Nunito',sans-serif;color:var(--text);outline:none}
.pill{background:transparent;border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.15s;white-space:nowrap}
.pill:hover{border-color:var(--border-hover);color:var(--text)}
.pill.active{background:var(--grad);border-color:transparent;color:#fff}

main{padding:22px 28px;max-width:1100px;margin:0 auto}
.section-header{display:flex; align-items:center; gap:10px; margin-bottom:16px; margin-top:20px}
.section-header h3{font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:1px}
.section-header .line{flex:1; height:1px; background:var(--border)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;align-items: start;}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color 0.2s;position:relative;cursor:default}
.card:hover{border-color:var(--border-hover)}
.card-accent{height:3px}
.ac-board{background:linear-gradient(90deg,#8b5cf6,#06b6d4)}
.ac-video{background:linear-gradient(90deg,#ec4899,#f59e0b)}
.ac-collect{background:linear-gradient(90deg,#10b981,#06b6d4)}
.ac-cards{background:linear-gradient(90deg,#f59e0b,#ef4444)}
.ac-misc{background:linear-gradient(90deg,#94a3b8,#475569)}

.card-img{width:100%;height:148px;object-fit:contain;background:#00000055;display:block;cursor:pointer}
.img-ph{width:100%;height:148px;background:#ffffff05;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:#ffffff18;font-size:10px;font-weight:700;text-transform:uppercase;cursor:pointer}
.card-body{padding:13px;cursor:pointer}
.cat-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px}
.cat-board{color:#a78bfa}.cat-video{color:#f472b6}.cat-collect{color:#34d399}.cat-cards{color:#fbbf24}.cat-misc{color:#94a3b8}

.new-badge{background:var(--grad);color:white;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.card-name{font-size:14px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:2px}
.card-detail{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600}
.card-desc{font-size:11px;color:#7a8099aa;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:30px}

.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:9px;border-top:1px solid var(--border)}
.price{font-size:16px;font-weight:800;color:var(--text)}
.cond{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase}

.cond-new { background: #10b98120; color: #34d399; }
.cond-vgood { background: #06b6d420; color: #22d3ee; }
.cond-good { background: #3b82f620; color: #60a5fa; }
.cond-average { background: #f59e0b20; color: #fbbf24; }
.cond-poor { background: #f9731620; color: #fb923c; }
.cond-damaged { background: #ef444420; color: #f87171; }
.cond-missing { background: #991b1b20; color: #fca5a5; border: 1px solid #ef444444; }

.card-actions{display:flex;gap:6px;margin-top:9px;padding:0 13px 13px 13px}
.act-btn{flex:1;border:1px solid var(--border);background:none;border-radius:7px;padding:6px 0;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Nunito',sans-serif;transition:all 0.12s}
.act-btn:hover{background:#ffffff08;color:var(--text)}

.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:400;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto;backdrop-filter:blur(3px)}
.modal-wrap.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:0;width:420px;max-width:100%;margin:auto}
.modal-inner{padding:24px}
.modal h2{font-family:'Righteous',cursive;font-size:17px;color:var(--text);margin-bottom:20px}

.slider-container{position:relative;width:100%;height:300px;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
.view-img{max-width:100%;max-height:100%;object-fit:contain}
.slider-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);color:white;border:none;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:20px;display:none;align-items:center;justify-content:center;transition:background 0.2s}
.slider-btn:hover{background:rgba(0,0,0,0.8)}
.prev-btn{left:10px}.next-btn{right:10px}
.img-dots{position:absolute;bottom:10px;display:flex;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.3)}
.dot.active{background:#fff}

.view-modal{width:500px}
.view-desc{font-size:13px;line-height:1.6;color:var(--text);margin-top:15px;background:#ffffff05;padding:12px;border-radius:8px;border:1px solid var(--border);white-space:pre-wrap}

.field{margin-bottom:13px}
.field label{display:block;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.field input, .field select, .field textarea{
  width:100%; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:9px 12px;
  font-family:'Nunito',sans-serif; font-size:13px; color:var(--text); outline:none;
}
.field select option { background: var(--surface); color: var(--text); }
.field textarea{height:62px;resize:none}

.modal-actions{display:flex;gap:8px;margin-top:18px}
.btn-primary{flex:1;background:var(--grad);color:#fff;border:none;padding:11px;border-radius:8px;font-weight:800;font-size:13px;cursor:pointer}
.btn-secondary{background:none;border:1px solid var(--border);color:var(--muted);padding:11px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:700}

.confirm-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center}
.confirm-wrap.open{display:flex}
.confirm-box{background:var(--surface);border:1px solid #ef444430;border-radius:14px;padding:24px;width:320px;text-align:center}
</style>
</head>
<body>

<header>
  <div class="logo-wrap"><div class="logo">Loot-Shelf</div><div class="admin-badge">Admin</div></div>
  <div class="header-right">
    <div class="stat-chip">Total Items: <span id="total-count">—</span></div>
    <a href="index.html" class="storefront-link" target="_blank">View Storefront ↗</a>
    <button class="add-btn" onclick="openModal()">+ Add Item</button>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search" placeholder="Search inventory..." oninput="render()">
  </div>
  <button class="pill active" onclick="setFilter('All',this)">All</button>
  <button class="pill" onclick="setFilter('Board Games',this)">Board Games</button>
  <button class="pill" onclick="setFilter('Books',this)">Books</button>
  <button class="pill" onclick="setFilter('Cards',this)">Cards</button>
  <button class="pill" onclick="setFilter('Collectibles',this)">Collectibles</button>
  <button class="pill" onclick="setFilter('Movies',this)">Movies</button>
  <button class="pill" onclick="setFilter('Video Games',this)">Video Games</button>
  <button class="pill" onclick="setFilter('Misc',this)">Misc</button>
</div>

<main id="main-content"></main>

<div class="modal-wrap" id="modal">
  <div class="modal">
    <div class="modal-inner">
      <h2 id="modal-title">Add listing</h2>
      <div class="field"><label>Item name</label><input id="f-name"></div>
      <div class="field"><label>Category</label>
        <select id="f-cat">
            <option value="Board Games">Board Games</option>
            <option value="Books">Books</option>
            <option value="Cards">Cards</option>
            <option value="Collectibles">Collectibles</option>
            <option value="Movies">Movies</option>
            <option value="Video Games">Video Games</option>
            <option value="Misc">Misc</option>
        </select>
      </div>
      <div class="field"><label>Details</label><input id="f-detail"></div>
      <div class="field"><label>Description</label><textarea id="f-desc"></textarea></div>
      <div class="field"><label>Price ($)</label><input id="f-price" type="number" step="0.01"></div>
      <div class="field"><label>Condition</label>
        <select id="f-cond">
            <option value="new">New</option>
            <option value="vgood">Used - Very Good</option>
            <option value="good">Used - Good</option>
            <option value="average">Used - Average</option>
            <option value="poor">Used - Poor</option>
            <option value="damaged">Damaged</option>
            <option value="missing">Missing Pieces</option>
        </select>
      </div>
      <div class="field"><label>Photos (Select multiple)</label>
        <input type="file" id="f-img" accept="image/*" multiple onchange="previewImg(this)">
        <div id="img-count-note" style="font-size:10px; color:var(--muted); margin-top:4px"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveItem()">Save listing</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-wrap" id="view-modal" onclick="closeView()">
  <div class="modal view-modal" onclick="event.stopPropagation()">
    <div class="slider-container">
      <button class="slider-btn prev-btn" onclick="slideAdmin(-1)">‹</button>
      <img id="v-img-main" class="view-img">
      <button class="slider-btn next-btn" onclick="slideAdmin(1)">›</button>
      <div id="v-dots" class="img-dots"></div>
    </div>
    <div class="modal-inner">
      <span id="v-cat" class="cat-label"></span>
      <h2 id="v-name" style="margin-bottom:5px"></h2>
      <div id="v-detail" style="font-size:12px; color:var(--muted); font-weight:700"></div>
      <div id="v-desc" class="view-desc"></div>
      <div class="modal-actions"><button class="btn-primary" onclick="closeView()">Done</button></div>
    </div>
  </div>
</div>

<div class="confirm-wrap" id="confirm">
  <div class="confirm-box">
    <h3>Remove item?</h3>
    <div class="confirm-actions" style="margin-top:20px">
      <button class="btn-secondary" onclick="closeConfirm()">Keep it</button>
      <button class="btn-primary" style="background:var(--red)" onclick="confirmDelete()">Remove</button>
    </div>
  </div>
</div>

<script>
const catAccent={'Board Games':'ac-board','Video Games':'ac-video','Books':'ac-board','Collectibles':'ac-collect','Cards':'ac-cards','Movies':'ac-video','Misc':'ac-misc'};
const catColor={'Board Games':'cat-board','Video Games':'cat-video','Books':'cat-board','Collectibles':'cat-collect','Cards':'cat-cards','Movies':'cat-video','Misc':'cat-misc'};

const condLabel = { new:'New', vgood:'Used - Very Good', good:'Used - Good', average:'Used - Average', poor:'Used - Poor', damaged:'Damaged', missing:'Missing Pieces' };
const condClass = { new:'cond-new', vgood:'cond-vgood', good:'cond-good', average:'cond-average', poor:'cond-poor', damaged:'cond-damaged', missing:'cond-missing' };

let activeFilter='All', editingId=null, deletingId=null, pendingImgData=[], items_cache=[];
let currentSliderImgs = [], currentSliderIdx = 0;

function loadItems(){
  const s=localStorage.getItem('loot-shelf_items');
  items_cache = s?JSON.parse(s):[];
  return items_cache;
}

function saveItems(items){
  try {
    localStorage.setItem('loot-shelf_items', JSON.stringify(items));
    return true;
  } catch (e) {
    alert("Error: Storage is full! Try using fewer images or remove old listings.");
    return false;
  }
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function createCardHTML(i, isNew) {
    const displayImg = Array.isArray(i.img) ? i.img[0] : i.img;
    return `<div class="card">
      <div class="card-accent ${catAccent[i.cat]||''}"></div>
      <div onclick="openView(${i.id})">
        ${displayImg ? `<img src="${displayImg}" class="card-img">` : `<div class="img-ph">No Image</div>`}
        <div class="card-body">
          <span class="cat-label ${catColor[i.cat]||''}">${i.cat}</span> ${isNew?'<span class="new-badge">New</span>':''}
          <div class="card-name">${i.name}</div>
          <div class="card-detail">${i.detail}</div>
          <div class="card-footer"><span class="price">$${parseFloat(i.price).toFixed(2)}</span><span class="cond ${condClass[i.cond]}">${condLabel[i.cond]}</span></div>
        </div>
      </div>
      <div class="card-actions">
        <button class="act-btn" onclick="openEdit(${i.id})">Edit</button>
        <button class="act-btn" onclick="openConfirm(${i.id})" style="color:var(--red)">Delete</button>
      </div>
    </div>`;
}

function render(){
  const items=loadItems();
  const q=(document.getElementById('search').value||'').toLowerCase();
  const now = new Date().getTime();
  const vis=items.filter(i=>{
    const mc=activeFilter==='All'||i.cat===activeFilter;
    const mq=!q||i.name.toLowerCase().includes(q);
    return mc&&mq;
  });

  document.getElementById('total-count').textContent=items.length;
  const newItems = vis.filter(i => i.createdAt && (now - i.createdAt < 604800000));
  const otherItems = vis.filter(i => !i.createdAt || (now - i.createdAt >= 604800000));

  let html = '';
  if (newItems.length > 0) {
      html += `<div class="section-header"><h3>Weekly Arrivals</h3><div class="line"></div></div>
               <div class="grid">${newItems.map(i => createCardHTML(i, true)).join('')}</div>`;
  }
  html += `<div class="section-header"><h3>Inventory (${vis.length})</h3><div class="line"></div></div>
           <div class="grid">${otherItems.map(i => createCardHTML(i, false)).join('')}</div>`;

  document.getElementById('main-content').innerHTML = html;
}

async function previewImg(input){
  if(!input.files || input.files.length === 0) return;
  pendingImgData = []; 
  document.getElementById('img-count-note').textContent = "Optimizing photos...";
  for (const file of input.files) {
    const optimized = await optimizeImage(file);
    pendingImgData.push(optimized);
  }
  document.getElementById('img-count-note').textContent = pendingImgData.length + " images ready";
}

function optimizeImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width, height = img.height, max = 800;
        if (width > height && width > max) { height *= max / width; width = max; } 
        else if (height > max) { width *= max / height; height = max; }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function openView(id){
  const i = items_cache.find(x=>x.id===id);
  if(!i) return;
  currentSliderImgs = Array.isArray(i.img) ? i.img : (i.img ? [i.img] : []);
  currentSliderIdx = 0; updateAdminSlider();
  document.getElementById('v-cat').textContent = i.cat;
  document.getElementById('v-cat').className = `cat-label ${catColor[i.cat]}`;
  document.getElementById('v-name').textContent = i.name;
  document.getElementById('v-detail').textContent = i.detail;
  document.getElementById('v-desc').textContent = i.desc || "No description.";
  document.getElementById('view-modal').classList.add('open');
}

function updateAdminSlider(){
  const imgEl = document.getElementById('v-img-main');
  const prev = document.querySelector('.prev-btn'), next = document.querySelector('.next-btn'), dots = document.getElementById('v-dots');
  if(currentSliderImgs.length === 0){
    imgEl.src = ''; [prev, next].forEach(b => b.style.display = 'none'); dots.innerHTML = ''; return;
  }
  imgEl.src = currentSliderImgs[currentSliderIdx];
  const multi = currentSliderImgs.length > 1;
  prev.style.display = multi ? 'flex' : 'none'; next.style.display = multi ? 'flex' : 'none';
  dots.innerHTML = currentSliderImgs.map((_,idx) => `<div class="dot ${idx===currentSliderIdx?'active':''}"></div>`).join('');
}

function slideAdmin(dir){
  currentSliderIdx = (currentSliderIdx + dir + currentSliderImgs.length) % currentSliderImgs.length;
  updateAdminSlider();
}

function closeView(){document.getElementById('view-modal').classList.remove('open');}

function openModal(){
  editingId=null; pendingImgData=[];
  document.getElementById('modal-title').textContent='Add listing';
  document.getElementById('img-count-note').textContent = '';
  ['f-name','f-detail','f-desc','f-price'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal').classList.add('open');
}

function openEdit(id){
  const i=items_cache.find(x=>x.id===id);
  editingId=id; pendingImgData = Array.isArray(i.img) ? [...i.img] : (i.img ? [i.img] : []);
  document.getElementById('modal-title').textContent='Edit listing';
  document.getElementById('f-name').value=i.name; document.getElementById('f-cat').value=i.cat;
  document.getElementById('f-detail').value=i.detail; document.getElementById('f-desc').value=i.desc||'';
  document.getElementById('f-price').value=i.price; document.getElementById('f-cond').value=i.cond;
  document.getElementById('img-count-note').textContent = pendingImgData.length + " images saved";
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

function saveItem(){
  const name = document.getElementById('f-name').value.trim();
  if(!name) { alert("Please enter an Item Name."); return; }
  const items=loadItems(), now = new Date().getTime();
  const data={
    name, cat:document.getElementById('f-cat').value, detail:document.getElementById('f-detail').value,
    desc:document.getElementById('f-desc').value, price:parseFloat(document.getElementById('f-price').value)||0,
    cond:document.getElementById('f-cond').value, img:pendingImgData, createdAt: now
  };
  if(editingId){
    const idx=items.findIndex(x=>x.id===editingId);
    items[idx]={...items[idx],...data, createdAt: items[idx].createdAt || now};
  } else {
    const maxId=items.reduce((m,i)=>Math.max(m,i.id),0);
    items.push({id:maxId+1,...data});
  }
  if (saveItems(items)) { closeModal(); render(); }
}

function openConfirm(id){deletingId=id;document.getElementById('confirm').classList.add('open');}
function closeConfirm(){document.getElementById('confirm').classList.remove('open');}
function confirmDelete(){
  const items = loadItems().filter(i=>i.id!==deletingId);
  if (saveItems(items)) { closeConfirm(); render(); }
}
window.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
